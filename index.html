<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G.A. Logix Logiciels</title>
  <meta name="description" content="G.A. Logix - Forestry data collection and management software. Logiciels de collecte et gestion de données forestières.">
  <script>
    (function() {
      var saved = localStorage.getItem('galogix-lang');
      if (saved === 'en') { window.location.replace('en/index.html'); return; }
      if (saved === 'fr') { window.location.replace('fr/index.html'); return; }
      var lang = (navigator.language || navigator.userLanguage || 'fr').toLowerCase();
      if (lang.startsWith('fr')) {
        window.location.replace('fr/index.html');
      } else {
        window.location.replace('en/index.html');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=fr/index.html">
  </noscript>
</head>
<body>
  <p><a href="fr/index.html">Français</a> | <a href="en/index.html">English</a></p>
</body>
</html>
